<style>
/* ============================================================
   DigitalMohan — Premium Landing Page
   Theme: Dark Mode + Glassmorphism + Neon Glow + Aurora
   ============================================================ */

/* ---------- Design Tokens ---------- */
:root{
  --bg:#0B1020;
  --bg-2:#0d1428;
  --cyan:#00C6FF;
  --violet:#7B2CFF;
  --orange:#FF8A00;
  --white:#FFFFFF;
  --muted:rgba(255,255,255,.62);
  --muted-2:rgba(255,255,255,.42);
  --glass:rgba(255,255,255,.05);
  --glass-strong:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.10);
  --radius:24px;
  --radius-sm:16px;
  --shadow-soft:0 20px 60px rgba(0,0,0,.45);
  --grad-primary:linear-gradient(120deg,#00C6FF 0%,#7B2CFF 55%,#FF8A00 120%);
  --grad-cv:linear-gradient(120deg,#00C6FF,#7B2CFF);
  --font-head:'Poppins',sans-serif;
  --font-body:'Inter',sans-serif;
  --maxw:1200px;
}

/* ---------- Reset ---------- */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--white);
  overflow-x:hidden;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--font-head);font-weight:700;line-height:1.15;letter-spacing:-.02em}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
ul{list-style:none}
section{position:relative;z-index:2}
::selection{background:var(--violet);color:#fff}

/* ---------- Aurora background ---------- */
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.aurora .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.5;mix-blend-mode:screen;will-change:transform}
.blob-1{width:520px;height:520px;background:radial-gradient(circle,#00C6FF,transparent 70%);top:-120px;left:-80px;animation:float1 18s ease-in-out infinite}
.blob-2{width:560px;height:560px;background:radial-gradient(circle,#7B2CFF,transparent 70%);top:20%;right:-140px;animation:float2 22s ease-in-out infinite}
.blob-3{width:480px;height:480px;background:radial-gradient(circle,#FF8A00,transparent 70%);bottom:-140px;left:30%;animation:float3 20s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(80px,60px) scale(1.15)}}
@keyframes float2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-70px,90px) scale(1.1)}}
@keyframes float3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,-70px) scale(1.2)}}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:60px 60px;mask-image:radial-gradient(circle at 50% 0%,#000,transparent 80%)}

/* particles canvas */
#particles{position:fixed;inset:0;z-index:1;pointer-events:none}

/* ---------- Container ---------- */
.container{max-width:var(--maxw);margin:0 auto;padding:0 22px;position:relative;z-index:2}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-head);font-weight:600;font-size:15px;
  padding:15px 28px;border-radius:60px;cursor:pointer;border:none;transition:.3s cubic-bezier(.2,.8,.2,1);position:relative;white-space:nowrap}
.btn-primary{background:var(--grad-primary);background-size:200% 200%;color:#fff;box-shadow:0 8px 30px rgba(123,44,255,.4)}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,198,255,.5);background-position:100% 0}
.btn-ghost{background:var(--glass);color:#fff;border:1px solid var(--border);backdrop-filter:blur(12px)}
.btn-ghost:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 30px rgba(0,198,255,.25)}

/* ---------- Section heading ---------- */
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--cyan);background:var(--glass);border:1px solid var(--border);padding:8px 16px;border-radius:60px;backdrop-filter:blur(10px);margin-bottom:20px}
.section-head{text-align:center;max-width:720px;margin:0 auto 56px}
.section-head h2{font-size:clamp(28px,4.5vw,46px);margin-bottom:14px}
.section-head p{color:var(--muted);font-size:17px}
.gradient-text{background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.section{padding:100px 0}

/* ---------- Glass base ---------- */
.glass{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}

/* ============ NAVBAR ============ */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;transition:.35s}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;max-width:1280px;margin:0 auto}
.nav.scrolled{background:rgba(11,16,32,.72);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--font-head);font-weight:700;font-size:20px}
.logo-mark{width:38px;height:38px;border-radius:12px;background:var(--grad-primary);display:grid;place-items:center;font-weight:800;color:#fff;box-shadow:0 6px 22px rgba(123,44,255,.5)}
.logo span{background:var(--grad-cv);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;align-items:center;gap:30px}
.nav-links a{font-size:15px;color:var(--muted);font-weight:500;transition:.25s;position:relative}
.nav-links a:hover{color:#fff}
.nav-links a::after{content:"";position:absolute;left:0;bottom:-6px;width:0;height:2px;background:var(--grad-cv);transition:.3s;border-radius:2px}
.nav-links a:hover::after{width:100%}
.nav-cta{display:flex;align-items:center;gap:14px}
.nav-cta .btn{padding:11px 22px;font-size:14px}
.hamburger{display:none;font-size:24px;background:none;border:none;color:#fff;cursor:pointer}
.mobile-menu{display:none;flex-direction:column;gap:6px;padding:14px 22px 24px}
.mobile-menu a{padding:12px 16px;border-radius:12px;color:var(--muted);font-weight:500}
.mobile-menu a:hover{background:var(--glass);color:#fff}
.mobile-menu.open{display:flex}

/* ============ HERO ============ */
.hero{min-height:100vh;display:flex;align-items:center;padding:130px 0 70px;position:relative}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:50px;align-items:center}
.hero-badge{display:inline-flex;align-items:center;gap:10px;background:var(--glass);border:1px solid var(--border);
  padding:9px 18px;border-radius:60px;font-size:13.5px;font-weight:500;color:var(--muted);backdrop-filter:blur(10px);margin-bottom:26px}
.hero-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{font-size:clamp(34px,5.4vw,60px);font-weight:800;margin-bottom:22px}
.hero h1 .hl{background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p.sub{font-size:17.5px;color:var(--muted);max-width:560px;margin-bottom:34px}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:34px}
.hero-mini{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
.hero-mini .mini{display:flex;flex-direction:column}
.hero-mini .mini b{font-family:var(--font-head);font-size:22px}
.hero-mini .mini small{color:var(--muted-2);font-size:12.5px}
.hero-tagline{font-family:var(--font-head);font-weight:600;letter-spacing:.3em;font-size:13px;color:var(--orange);text-transform:uppercase;margin-bottom:16px}

/* Phone mockup */
.phone-wrap{position:relative;display:flex;justify-content:center;perspective:1200px}
.phone{position:relative;width:290px;height:600px;border-radius:44px;padding:12px;
  background:linear-gradient(160deg,#1c2440,#0b1020);border:1px solid rgba(255,255,255,.14);
  box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 60px rgba(123,44,255,.28),inset 0 0 30px rgba(255,255,255,.04);
  animation:phoneFloat 6s ease-in-out infinite;transform:rotateY(-12deg) rotateX(4deg)}
@keyframes phoneFloat{0%,100%{transform:rotateY(-12deg) rotateX(4deg) translateY(0)}50%{transform:rotateY(-8deg) rotateX(2deg) translateY(-18px)}}
.phone-notch{position:absolute;top:22px;left:50%;transform:translateX(-50%);width:110px;height:26px;background:#05070f;border-radius:20px;z-index:5}
.phone-screen{width:100%;height:100%;border-radius:34px;overflow:hidden;background:linear-gradient(180deg,#0e1530,#0a0f22);position:relative}
.phone-glare{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.16),transparent 45%);z-index:6;pointer-events:none;border-radius:34px}
/* app UI inside phone */
.app-ui{padding:44px 16px 16px;color:#fff;font-size:12px}
.app-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.app-top .brand{font-family:var(--font-head);font-weight:700;font-size:15px}
.app-top .brand span{background:var(--grad-cv);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.app-search{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:12px;padding:9px 12px;color:var(--muted);font-size:11px;margin-bottom:16px;display:flex;gap:8px;align-items:center}
.app-hero-card{background:var(--grad-primary);border-radius:16px;padding:16px;margin-bottom:16px}
.app-hero-card h4{font-size:13px;margin-bottom:4px}
.app-hero-card p{font-size:10px;opacity:.85}
.app-cats{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.app-cats span{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:20px;padding:6px 10px;font-size:10px}
.app-prod{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.app-prod .p{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.app-prod .p .thumb{height:56px;background:linear-gradient(135deg,#7B2CFF,#00C6FF)}
.app-prod .p:nth-child(2) .thumb{background:linear-gradient(135deg,#FF8A00,#7B2CFF)}
.app-prod .p:nth-child(3) .thumb{background:linear-gradient(135deg,#00C6FF,#FF8A00)}
.app-prod .p:nth-child(4) .thumb{background:linear-gradient(135deg,#7B2CFF,#FF8A00)}
.app-prod .p .info{padding:8px}
.app-prod .p .info b{font-size:10px}
.app-prod .p .info small{display:block;color:var(--cyan);font-size:11px;font-weight:700;margin-top:2px}
/* floating chips around phone */
.chip{position:absolute;background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(14px);
  border-radius:16px;padding:11px 15px;display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow-soft);z-index:10}
.chip i{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;color:#fff;font-size:12px}
.chip.c1{top:12%;left:-32px;animation:chipFloat 5s ease-in-out infinite}
.chip.c1 i{background:linear-gradient(135deg,#00C6FF,#7B2CFF)}
.chip.c2{bottom:20%;right:-40px;animation:chipFloat 5s ease-in-out infinite .8s}
.chip.c2 i{background:linear-gradient(135deg,#FF8A00,#7B2CFF)}
.chip.c3{bottom:6%;left:-10px;animation:chipFloat 6s ease-in-out infinite 1.6s}
.chip.c3 i{background:linear-gradient(135deg,#7B2CFF,#00C6FF)}
@keyframes chipFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

/* ============ TRUST / STATS ============ */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.stat{padding:38px 24px;text-align:center;border-radius:var(--radius);position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;inset:0;background:var(--grad-primary);opacity:0;transition:.4s}
.stat:hover::before{opacity:.06}
.stat .num{font-family:var(--font-head);font-weight:800;font-size:clamp(32px,4vw,46px);background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat .lbl{color:var(--muted);font-size:14.5px;margin-top:6px;font-weight:500}

/* ============ CATEGORIES ============ */
.cat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px}
.cat-card{padding:28px 18px;text-align:center;border-radius:var(--radius-sm);transition:.35s cubic-bezier(.2,.8,.2,1);cursor:pointer;position:relative;overflow:hidden}
.cat-card:hover{transform:translateY(-8px);border-color:rgba(0,198,255,.4);box-shadow:0 20px 45px rgba(0,198,255,.15)}
.cat-ic{width:60px;height:60px;margin:0 auto 16px;border-radius:18px;display:grid;place-items:center;font-size:26px;
  background:var(--glass-strong);border:1px solid var(--border);transition:.35s}
.cat-card:hover .cat-ic{background:var(--grad-primary);transform:scale(1.08) rotate(-4deg);box-shadow:0 8px 26px rgba(123,44,255,.45)}
.cat-card h4{font-size:15px;font-weight:600}

/* ============ FEATURES ============ */
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.feat-card{padding:26px 22px;border-radius:var(--radius-sm);transition:.35s;position:relative;overflow:hidden}
.feat-card:hover{transform:translateY(-6px);border-color:rgba(123,44,255,.4);box-shadow:0 18px 40px rgba(123,44,255,.14)}
.feat-ic{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;font-size:20px;color:#fff;margin-bottom:16px;background:var(--grad-cv)}
.feat-card:nth-child(3n) .feat-ic{background:linear-gradient(135deg,#FF8A00,#7B2CFF)}
.feat-card:nth-child(3n+1) .feat-ic{background:linear-gradient(135deg,#00C6FF,#FF8A00)}
.feat-card h4{font-size:16.5px;margin-bottom:8px}
.feat-card p{color:var(--muted);font-size:13.5px}

/* ============ APP SHOWCASE ============ */
.showcase{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;align-items:end}
.sc-phone{position:relative;border-radius:30px;padding:8px;background:linear-gradient(160deg,#1c2440,#0b1020);border:1px solid rgba(255,255,255,.12);
  box-shadow:var(--shadow-soft);transition:.4s;overflow:hidden}
.sc-phone:hover{transform:translateY(-14px);box-shadow:0 30px 70px rgba(0,198,255,.25)}
.sc-screen{border-radius:22px;height:340px;position:relative;overflow:hidden;display:flex;flex-direction:column;padding:20px 12px;font-size:10px}
.sc-glare{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.14),transparent 50%);pointer-events:none}
.sc-label{text-align:center;margin-top:14px;font-family:var(--font-head);font-weight:600;font-size:14px;color:var(--muted)}
.sc-2{margin-bottom:40px}.sc-4{margin-bottom:40px}
/* mini screens */
.sc-home{background:linear-gradient(180deg,#0e1530,#0a0f22)}
.sc-detail{background:linear-gradient(180deg,#141032,#0a0f22)}
.sc-down{background:linear-gradient(180deg,#0e1a32,#0a0f22)}
.sc-wish{background:linear-gradient(180deg,#1a1230,#0a0f22)}
.sc-profile{background:linear-gradient(180deg,#0e1530,#141032)}
.sc-title{font-family:var(--font-head);font-weight:700;font-size:13px;margin-bottom:12px;color:#fff}
.sc-block{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.sc-block.h1{height:70px;background:var(--grad-primary)}
.sc-block.h2{height:26px}.sc-block.h3{height:40px}
.sc-row{display:flex;gap:8px;margin-bottom:8px}
.sc-row>div{flex:1;height:52px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px}
.sc-avatar{width:56px;height:56px;border-radius:50%;background:var(--grad-primary);margin:0 auto 10px}

/* ============ WHY CHOOSE (timeline) ============ */
.why-wrap{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.why-left h2{font-size:clamp(28px,4vw,44px);margin-bottom:18px}
.why-left p{color:var(--muted);font-size:16px;margin-bottom:26px}
.why-timeline{display:grid;gap:14px}
.tl-card{display:flex;gap:16px;align-items:center;padding:18px 22px;border-radius:var(--radius-sm);transition:.3s}
.tl-card:hover{transform:translateX(8px);border-color:rgba(0,198,255,.4)}
.tl-ic{width:44px;height:44px;min-width:44px;border-radius:12px;display:grid;place-items:center;background:var(--grad-cv);font-size:17px;color:#fff}
.tl-card:nth-child(even) .tl-ic{background:linear-gradient(135deg,#FF8A00,#7B2CFF)}
.tl-card h4{font-size:16px}
.tl-card p{color:var(--muted);font-size:13px;margin:0}
.why-timeline{grid-template-columns:1fr 1fr}
@media(max-width:560px){.why-timeline{grid-template-columns:1fr}}

/* ============ FEATURED PRODUCTS ============ */
.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.prod-card{border-radius:var(--radius-sm);overflow:hidden;transition:.35s;position:relative}
.prod-card:hover{transform:translateY(-8px);box-shadow:0 24px 55px rgba(123,44,255,.22);border-color:rgba(123,44,255,.4)}
.prod-img{height:150px;position:relative;overflow:hidden;display:grid;place-items:center;font-size:44px;color:rgba(255,255,255,.9)}
.prod-card:nth-child(1) .prod-img{background:linear-gradient(135deg,#7B2CFF,#00C6FF)}
.prod-card:nth-child(2) .prod-img{background:linear-gradient(135deg,#FF8A00,#7B2CFF)}
.prod-card:nth-child(3) .prod-img{background:linear-gradient(135deg,#00C6FF,#FF8A00)}
.prod-card:nth-child(4) .prod-img{background:linear-gradient(135deg,#7B2CFF,#FF8A00)}
.badge{position:absolute;top:12px;left:12px;background:#FF8A00;color:#fff;font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;box-shadow:0 4px 14px rgba(255,138,0,.5)}
.wish-btn{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(11,16,32,.5);border:1px solid var(--border);
  display:grid;place-items:center;color:#fff;cursor:pointer;backdrop-filter:blur(8px);transition:.25s}
.wish-btn:hover,.wish-btn.active{background:#FF8A00;color:#fff;border-color:#FF8A00}
.prod-body{padding:16px}
.prod-body .seller{font-size:12px;color:var(--cyan);font-weight:600;margin-bottom:5px}
.prod-body h4{font-size:15.5px;margin-bottom:8px}
.prod-rating{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);margin-bottom:12px}
.prod-rating .stars{color:#FF8A00}
.prod-foot{display:flex;align-items:center;justify-content:space-between}
.prod-price{display:flex;align-items:baseline;gap:8px}
.prod-price b{font-family:var(--font-head);font-size:19px}
.prod-price s{color:var(--muted-2);font-size:13px}
.buy-btn{background:var(--grad-cv);border:none;color:#fff;font-weight:600;font-size:13px;padding:9px 16px;border-radius:30px;cursor:pointer;transition:.25s;font-family:var(--font-head)}
.buy-btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,198,255,.4)}

/* ============ TESTIMONIALS =========
